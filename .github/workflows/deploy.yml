name: Deploy

on:
  workflow_run:
    workflows: ["Coverage Report"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker image to GHCR
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository }}:latest

  migrate:
    name: Apply EF Core migrations (Init Container)
    needs: [build-and-push]
    if: ${{ github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    # Migrations are applied by an initContainer in deployment-api.yaml before the API starts.
    # This job patches the deployment image so the initContainer picks up the correct version.
    permissions:
      contents: read

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: echo "$KUBECONFIG_B64" | base64 -d > ${{ runner.temp }}/kubeconfig.yaml

      - name: Patch API deployment image
        run: |
          kubectl set image deployment/mechanics-software-api \
            api=ghcr.io/${{ github.repository }}:sha-${{ needs.build-and-push.outputs.sha_tag }} \
            --namespace mechanics-software \
            --kubeconfig ${{ runner.temp }}/kubeconfig.yaml

      - name: Wait for migration initContainer to complete
        run: |
          kubectl rollout status deployment/mechanics-software-api \
            --namespace mechanics-software \
            --timeout=180s \
            --kubeconfig ${{ runner.temp }}/kubeconfig.yaml

  deploy:
    name: Apply K8s manifests
    needs: [build-and-push, migrate]
    if: ${{ github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: echo "$KUBECONFIG_B64" | base64 -d > ${{ runner.temp }}/kubeconfig.yaml

      - name: Pin image tag in deployment manifest
        run: |
          sed -i "s|ghcr.io/${{ github.repository }}:latest|ghcr.io/${{ github.repository }}:sha-${{ needs.build-and-push.outputs.sha_tag }}|g" \
            k8s/deployment-api.yaml

      - name: Apply all K8s manifests
        run: |
          kubectl apply -f k8s/ \
            --kubeconfig ${{ runner.temp }}/kubeconfig.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/mechanics-software-api \
            --namespace mechanics-software \
            --timeout=120s \
            --kubeconfig ${{ runner.temp }}/kubeconfig.yaml

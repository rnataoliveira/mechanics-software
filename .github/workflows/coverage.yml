name: Coverage Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java (required by SonarScanner)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install .NET global tools
        run: |
          dotnet tool install -g dotnet-sonarscanner
          dotnet tool install -g dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Begin SonarCloud analysis
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"rnataoliveira_mechanics-software" \
            /o:"rnataoliveira" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="coverage-results/**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**,**/Persistence/Seeding/**,DELIVERABLES.html,docker-compose*.yml,**/appsettings.Development.json,scripts/**,infra/**,k8s/**,.github/workflows/deploy.yml" \
            /d:sonar.coverage.exclusions="**/Migrations/**,**/obj/**,**/bin/**,**/Persistence/Seeding/DatabaseSeeder.cs,**/Program.cs"

      - name: Build solution
        run: dotnet build --no-restore --no-incremental

      - name: Run unit tests with coverage
        run: |
          dotnet test tests/MechanicsSoftware.UnitTests/ \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage-results \
            --logger "trx;LogFileName=test-results.trx"

      - name: End SonarCloud analysis
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end

      - name: Generate HTML coverage report
        if: always()
        run: |
          reportgenerator \
            -reports:"./coverage-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-html" \
            -reporttypes:"Html;HtmlSummary;Cobertura;MarkdownSummaryGithub" \
            -assemblyfilters:"-*.Tests;-*.UnitTests;-*.IntegrationTests" \
            -title:"MechanicsSoftware — Coverage Report"
          find ./coverage-html -type f \( -name "*.css" -o -name "*.html" -o -name "*.htm" -o -name "*.svg" \) \
            -exec sed -i -E 's/#c00([^0-9a-fA-F])/#0066cc\1/g' {} +

      - name: Run vulnerability scan
        if: always()
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee ./vuln-output.txt || true

      - name: Generate security HTML report
        if: always()
        run: python3 .github/scripts/generate_security_report.py

      - name: Add deliverables page to site
        if: always()
        run: |
          mkdir -p ./coverage-html/deliverables
          cp DELIVERABLES.html ./coverage-html/deliverables/index.html

      - name: Write coverage summary to workflow run
        if: always()
        run: cat ./coverage-html/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Enforce 80% line coverage threshold
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, glob, sys

          files = glob.glob("coverage-results/**/coverage.cobertura.xml", recursive=True)
          if not files:
              print("No coverage file found", file=sys.stderr)
              sys.exit(1)

          tree = ET.parse(files[0])
          root = tree.getroot()
          line_rate = float(root.get("line-rate", 0))
          branch_rate = float(root.get("branch-rate", 0))
          line_pct = line_rate * 100
          branch_pct = branch_rate * 100

          print(f"Line coverage:   {line_pct:.1f}%")
          print(f"Branch coverage: {branch_pct:.1f}%")

          if line_pct < 80:
              print(f"FAILED: line coverage {line_pct:.1f}% is below the 80% minimum.", file=sys.stderr)
              sys.exit(1)

          print("Coverage threshold met.")
          EOF

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: ./coverage-html
          retention-days: 30

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./coverage-html

      - name: Deploy to GitHub Pages
        if: always()
        id: deploy-pages
        uses: actions/deploy-pages@v5

      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: coverage-results/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '80 90'

      - name: Build PR comment with coverage summary and Pages link
        if: github.event_name == 'pull_request'
        run: |
          {
            cat code-coverage-results.md
            echo ""
            echo "---"
            echo "📊 **[Full interactive coverage report →](https://rnataoliveira.github.io/mechanics-software/)**"
            echo "🔒 **[Vulnerability report →](https://rnataoliveira.github.io/mechanics-software/security/)**"
            echo "📄 **[Deliverables →](https://rnataoliveira.github.io/mechanics-software/deliverables/)**"
          } > coverage-comment.md

      - name: Add PR comment with coverage summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          recreate: true
          path: coverage-comment.md

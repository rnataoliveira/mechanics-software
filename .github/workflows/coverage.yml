name: Coverage Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Java (required by SonarScanner)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install .NET global tools
        run: |
          dotnet tool install -g dotnet-sonarscanner
          dotnet tool install -g dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"rnataoliveira_mechanics-software" \
            /o:"rnataoliveira" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="coverage-results/**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**,**/Persistence/Seeding/**,DELIVERABLES.html,docker-compose*.yml,**/appsettings.Development.json,scripts/**,infra/**,k8s/secret.yaml" \
            /d:sonar.coverage.exclusions="**/Migrations/**,**/obj/**,**/bin/**,**/Persistence/Seeding/DatabaseSeeder.cs,**/Program.cs"

      - name: Build solution
        run: dotnet build --no-restore --no-incremental

      - name: Run unit tests with coverage
        run: |
          dotnet test tests/MechanicsSoftware.UnitTests/ \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage-results \
            --logger "trx;LogFileName=test-results.trx"

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end

      - name: Generate HTML coverage report
        if: always()
        run: |
          reportgenerator \
            -reports:"./coverage-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-html" \
            -reporttypes:"Html;HtmlSummary;Cobertura;MarkdownSummaryGithub" \
            -assemblyfilters:"-*.Tests;-*.UnitTests;-*.IntegrationTests" \
            -title:"MechanicsSoftware — Coverage Report"
          find ./coverage-html -type f \( -name "*.css" -o -name "*.html" -o -name "*.htm" -o -name "*.svg" \) \
            -exec sed -i -E 's/#c00([^0-9a-fA-F])/#0066cc\1/g' {} +

      - name: Run vulnerability scan
        if: always()
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee ./vuln-output.txt || true

      - name: Generate security HTML report
        if: always()
        run: |
          mkdir -p ./coverage-html/security
          python3 - <<'EOF'
          import html, datetime, pathlib

          raw = pathlib.Path("vuln-output.txt").read_text()
          lines = raw.splitlines()

          has_vulns = any(
              kw in line
              for line in lines
              for kw in ("Critical", "High", "Moderate", "Low")
          )

          badge_color = "#d73a49" if has_vulns else "#2ea44f"
          badge_text  = "vulnerabilities found" if has_vulns else "no vulnerabilities"

          rows = ""
          for line in lines:
              stripped = line.strip()
              if not stripped:
                  continue
              safe = html.escape(stripped)
              if any(kw in stripped for kw in ("Critical", "High")):
                  rows += f'<tr class="sev-high"><td><code>{safe}</code></td></tr>\n'
              elif "Moderate" in stripped:
                  rows += f'<tr class="sev-mod"><td><code>{safe}</code></td></tr>\n'
              elif "Low" in stripped:
                  rows += f'<tr class="sev-low"><td><code>{safe}</code></td></tr>\n'
              else:
                  rows += f'<tr><td><code>{safe}</code></td></tr>\n'

          generated = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>MechanicsSoftware — Vulnerability Report</title>
            <style>
              body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                     margin: 0; background: #f6f8fa; color: #24292e; }}
              header {{ background: #24292e; color: #fff; padding: 1rem 2rem; }}
              header a {{ color: #58a6ff; text-decoration: none; font-size: .9rem; }}
              .badge {{ display:inline-block; padding:.25em .6em; border-radius:2em;
                        background:{badge_color}; color:#fff; font-weight:600; font-size:.85rem; }}
              main {{ max-width: 900px; margin: 2rem auto; padding: 0 1rem; }}
              table {{ width:100%; border-collapse:collapse; background:#fff;
                       border:1px solid #e1e4e8; border-radius:6px; overflow:hidden; }}
              td {{ padding:.5rem 1rem; border-bottom:1px solid #e1e4e8; font-size:.85rem; }}
              tr:last-child td {{ border-bottom:none; }}
              .sev-high td  {{ background:#ffeef0; }}
              .sev-mod  td  {{ background:#fff8c5; }}
              .sev-low  td  {{ background:#f1f8ff; }}
              footer {{ text-align:center; font-size:.8rem; color:#6a737d; padding:2rem; }}
            </style>
          </head>
          <body>
            <header>
              <strong>MechanicsSoftware</strong>
              &nbsp;·&nbsp;
              <a href="../index.html">← Coverage Report</a>
            </header>
            <main>
              <h1>Vulnerability Report &nbsp;<span class="badge">{badge_text}</span></h1>
              <p>Generated: {generated}</p>
              <p>Command: <code>dotnet list package --vulnerable --include-transitive</code></p>
              <table>{rows}</table>
            </main>
            <footer>MechanicsSoftware · FIAP POS Tech 15SOAT · Fase 1</footer>
          </body>
          </html>"""

          pathlib.Path("coverage-html/security/index.html").write_text(page)
          print("Security report written.")
          EOF

      - name: Add deliverables page to site
        if: always()
        run: |
          mkdir -p ./coverage-html/deliverables
          cp DELIVERABLES.html ./coverage-html/deliverables/index.html

      - name: Write coverage summary to workflow run
        if: always()
        run: cat ./coverage-html/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Enforce 80% line coverage threshold
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, glob, sys

          files = glob.glob("coverage-results/**/coverage.cobertura.xml", recursive=True)
          if not files:
              print("No coverage file found", file=sys.stderr)
              sys.exit(1)

          tree = ET.parse(files[0])
          root = tree.getroot()
          line_rate = float(root.get("line-rate", 0))
          branch_rate = float(root.get("branch-rate", 0))
          line_pct = line_rate * 100
          branch_pct = branch_rate * 100

          print(f"Line coverage:   {line_pct:.1f}%")
          print(f"Branch coverage: {branch_pct:.1f}%")

          if line_pct < 80:
              print(f"FAILED: line coverage {line_pct:.1f}% is below the 80% minimum.", file=sys.stderr)
              sys.exit(1)

          print("Coverage threshold met.")
          EOF

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: ./coverage-html
          retention-days: 30

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./coverage-html

      - name: Deploy to GitHub Pages
        if: always()
        id: deploy-pages
        uses: actions/deploy-pages@v5

      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: coverage-results/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '80 90'

      - name: Build PR comment with coverage summary and Pages link
        if: github.event_name == 'pull_request'
        run: |
          {
            cat code-coverage-results.md
            echo ""
            echo "---"
            echo "📊 **[Full interactive coverage report →](https://rnataoliveira.github.io/mechanics-software/)**"
            echo "🔒 **[Vulnerability report →](https://rnataoliveira.github.io/mechanics-software/security/)**"
            echo "📄 **[Deliverables →](https://rnataoliveira.github.io/mechanics-software/deliverables/)**"
          } > coverage-comment.md

      - name: Add PR comment with coverage summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          recreate: true
          path: coverage-comment.md

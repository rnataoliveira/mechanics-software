apiVersion: v1
kind: Secret
metadata:
  name: mechanics-secrets
  namespace: mechanics-software
  labels:
    app: mechanics-software
type: Opaque
# stringData values are plain-text placeholders.
# In production, replace via CI/CD using GitHub Secrets before applying.
# Generate base64 with: echo -n "your-value" | base64
stringData:
  # Application — connection string uses the K8s service name as host
  ConnectionStrings__DefaultConnection: "Host=mechanics-software-db;Port=5432;Database=mechanics_software;Username=postgres;Password=CHANGE_ME"
  JWT_SECRET: "CHANGE_ME_minimum_32_chars_jwt_signing_key"
  # SMTP (required by IEmailNotifier / F2-04)
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@example.com"
  SMTP_PASS: "CHANGE_ME"
  SMTP_FROM: "MechanicsSoftware <noreply@example.com>"
  # PostgreSQL init — must match the password in ConnectionStrings above
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME"

apiVersion: v1
kind: Secret
metadata:
  name: mechanics-secrets
  namespace: mechanics-software
  labels:
    app: mechanics-software
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=mechanics-software-db;Port=5432;Database=mechanics_software;Username=postgres;Password=${DB_PASSWORD}"
  JWT_SECRET: "${JWT_SECRET}"
  SMTP_HOST: "${SMTP_HOST}"
  SMTP_PORT: "${SMTP_PORT}"
  SMTP_USER: "${SMTP_USER}"
  SMTP_PASS: "${SMTP_PASS}"
  SMTP_FROM: "${SMTP_FROM}"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "${DB_PASSWORD}"

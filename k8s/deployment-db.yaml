apiVersion: apps/v1
kind: Deployment
metadata:
  name: mechanics-software-db
  namespace: mechanics-software
  labels:
    app: mechanics-software
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mechanics-software
      tier: db
  template:
    metadata:
      labels:
        app: mechanics-software
        tier: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mechanics-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mechanics-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: mechanics_software
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

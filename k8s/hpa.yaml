apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mechanics-software-api
  namespace: mechanics-software
  labels:
    app: mechanics-software-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mechanics-software-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
